<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TruthLens - Premium Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(16, 16, 34, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .glow-border:focus-within {
            border-color: #1313ec;
            box-shadow: 0 0 15px rgba(19, 19, 236, 0.3);
        }
        .bg-grid {
            background-image: linear-gradient(to right, rgba(19, 19, 236, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(19, 19, 236, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-200 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute inset-0 bg-grid z-0"></div>
<div class="absolute -top-[20%] -left-[10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] z-0"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] z-0"></div>
<div class="w-full max-w-xl px-6 py-12 relative z-10">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary/20 border border-primary/30 mb-6 shadow-[0_0_20px_rgba(19,19,236,0.2)]">
<span class="material-icons text-primary text-4xl">travel_explore</span>
</div>
<h1 class="text-4xl font-bold tracking-tight text-white mb-2">TruthLens</h1>
<p class="text-slate-400 text-lg">Join the mission to identify truth in a digital world.</p>
</div>
<!-- Registration Card -->
<div class="glass-panel rounded-xl p-8 md:p-10">
<h2 class="text-xl font-semibold text-white mb-8 border-l-4 border-primary pl-4">Create Your Account</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-400" for="full-name">Full Name</label>
<div class="relative glow-border rounded-lg border border-slate-700 transition-all duration-300">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">person</span>
<input class="block w-full bg-transparent border-0 pl-10 pr-4 py-3 text-white focus:ring-0 focus:outline-none placeholder-slate-600 rounded-lg" id="full-name" name="full-name" placeholder="Alex Thorne" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-400" for="email">Email Address</label>
<div class="relative glow-border rounded-lg border border-slate-700 transition-all duration-300">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">alternate_email</span>
<input class="block w-full bg-transparent border-0 pl-10 pr-4 py-3 text-white focus:ring-0 focus:outline-none placeholder-slate-600 rounded-lg" id="email" name="email" placeholder="alex@truthlens.ai" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-400" for="password">Security Password</label>
<div class="relative glow-border rounded-lg border border-slate-700 transition-all duration-300">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">lock</span>
<input class="block w-full bg-transparent border-0 pl-10 pr-12 py-3 text-white focus:ring-0 focus:outline-none placeholder-slate-600 rounded-lg" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors" type="button">
<span class="material-icons text-sm">visibility_off</span>
</button>
</div>
</div>
<!-- Role Selection -->
<div class="space-y-3">
<label class="block text-sm font-medium text-slate-400">Identify Your Role</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-primary/40 bg-primary/10 text-primary transition-all shadow-[0_0_10px_rgba(19,19,236,0.1)]" type="button">
<span class="material-icons text-lg mb-1">school</span>
<span class="text-[10px] uppercase tracking-wider font-bold">Student</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-slate-700 bg-slate-800/20 text-slate-400 hover:border-slate-500 transition-all" type="button">
<span class="material-icons text-lg mb-1">co_present</span>
<span class="text-[10px] uppercase tracking-wider font-bold">Educator</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-slate-700 bg-slate-800/20 text-slate-400 hover:border-slate-500 transition-all" type="button">
<span class="material-icons text-lg mb-1">science</span>
<span class="text-[10px] uppercase tracking-wider font-bold">Researcher</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-[0_0_20px_rgba(19,19,236,0.4)] transition-all flex items-center justify-center gap-2 group" type="submit">
                        Join TruthLens
                        <span class="material-icons text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</form>
<!-- Card Footer -->
<div class="mt-8 pt-8 border-t border-slate-800 flex flex-col items-center gap-4">
<p class="text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary hover:underline underline-offset-4 font-semibold" href="#">Log in</a>
</p>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
<span class="material-icons text-emerald-500 text-[12px]">verified_user</span>
<span class="text-[10px] font-bold text-emerald-500 tracking-widest uppercase">Secure 256-bit Registration</span>
</div>
</div>
</div>
<!-- External Footer Links -->
<div class="mt-8 flex justify-center gap-6 text-[11px] font-medium text-slate-500 uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 rounded-full bg-slate-700"></span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 rounded-full bg-slate-700"></span>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
<!-- Background Elements -->
<div class="fixed bottom-10 right-10 flex flex-col items-end opacity-20 pointer-events-none">
<div class="text-[80px] font-black text-slate-800 leading-none">VERITY</div>
<div class="text-[40px] font-light text-primary leading-none -mt-4">PROTOCOLS</div>
</div>
</body></html>
